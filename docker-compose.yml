version: '3.8'

services:
  # PostgreSQL with TimescaleDB and PostGIS
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: floatchat-postgres
    environment:
      POSTGRES_DB: floatchat
      POSTGRES_USER: floatchat_user
      POSTGRES_PASSWORD: floatchat_password_dev
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floatchat_user -d floatchat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - floatchat-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: floatchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - floatchat-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: floatchat-backend
    environment:
      DATABASE_URL: postgresql://floatchat_user:floatchat_password_dev@postgres:5432/floatchat
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ocean_knowledge
      RAG_ENABLED: "true"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - floatchat-network

  # Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: floatchat-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - floatchat-network

  # Qdrant vector database (RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: floatchat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - floatchat-network

volumes:
  postgres_data:
  redis_data:
  backend_cache:
  ollama_data:
  qdrant_data:

networks:
  floatchat-network:
    driver: bridge
